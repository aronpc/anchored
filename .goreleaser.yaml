version: 2

builds:
  - id: anchored
    main: ./cmd/anchored
    binary: anchored
    # zig cc pins the glibc baseline to 2.31 (Ubuntu 20.04 / Debian 11) so the
    # released binaries run on older distros; the runner's native gcc would
    # link against its current glibc and break them there. Wrappers are
    # installed by the release workflow.
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-DSQLITE_ENABLE_FTS5
      - CGO_LDFLAGS=-lm
      - CC=zcc-amd64
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CC=zcc-arm64

  - id: anchored-windows
    main: ./cmd/anchored
    binary: anchored
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-DSQLITE_ENABLE_FTS5
      - CC=x86_64-w64-mingw32-gcc
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: unix
    builds:
      - anchored
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: windows
    builds:
      - anchored-windows
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: jholhewres
    name: anchored
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
